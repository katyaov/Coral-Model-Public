name: coral
channels:
  - conda-forge
dependencies:
  # Core Python
  - python=3.12
  - pip

  # Jupyter ecosystem
  - jupyter
  - jupyterlab
  - notebook
  - ipykernel
  - ipython

  # Data science core
  - numpy
  - pandas
  - matplotlib
  - scipy

  # File handling
  - openpyxl
  - pyyaml

  # Web and HTTP
  - requests
  - httpx
  - beautifulsoup4

  # Async and concurrency
  - anyio
  - asyncio

  # Development tools
  - setuptools
  - wheel

  # Security
  - cryptography

  # Optional: GUI support (comment out if not needed on headless systems)
  # - pyqt

  # Pip dependencies (for packages not available in conda-forge)
  - pip:
    - argon2-cffi
    - jupyter-lsp
    - nbconvert

# Platform-specific notes:
# - This environment removes macOS-specific system libraries
# - PyQt is commented out but can be uncommented if GUI is needed
# - All core functionality should work on Windows, macOS, and Linux
# - Some system libraries will be automatically resolved by conda based on the target platform