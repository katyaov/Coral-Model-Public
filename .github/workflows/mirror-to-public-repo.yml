name: Mirror main branch only

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror with explicit PAT checkout
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Clone public repo directly with PAT (no checkout action)
          git clone "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/katyaov/Coral-Model-Public.git" public-repo
          cd public-repo
          
          # Fetch main from private repo and hard reset
          git remote add private https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/katyaov/Coral-Model.git || true
          git fetch private main
          git checkout main
          git reset --hard private/main
          
          # Remove workflows if they exist
          git rm -r --quiet .github/workflows/ 2>/dev/null || true
          git rm -r --quiet .github/ 2>/dev/null || true
          
          # Push back to public main
          git push origin main
