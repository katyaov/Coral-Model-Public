name: Mirror main branch only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main branch only
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Configure git to ALWAYS use our PAT
          git config --global url."https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          git config --global user.name "katyaov"
          git config --global user.email "katyaov@github.com"
          
          # Remove workflows
          git rm -r --quiet .github/workflows/ 2>/dev/null || true
          git rm -r --quiet .github/ 2>/dev/null || true
          
          # Simple push - PAT is now used automatically
          git push https://github.com/katyaov/Coral-Model-Public.git main:main
