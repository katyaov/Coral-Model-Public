name: Mirror to public

on:
  push:
    branches:
      - main
      - '**'        # run on any branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MIRROR_TOKEN }}

      - name: Push to public mirror
        run: |
          git remote add public https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/katyaov/Coral-Model-Public.git
          git remote -v
          git push --mirror public
