name: Mirror main branch only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main branch only
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Remove workflows from private repo before pushing
          git rm -r --quiet .github/workflows/ 2>/dev/null || true
          git rm -r --quiet .github/ 2>/dev/null || true
          
          # Add public remote
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/katyaov/Coral-Model-Public.git || true
          
          # Push ONLY main branch (no --mirror, no other branches/tags)
          git push public main:main
