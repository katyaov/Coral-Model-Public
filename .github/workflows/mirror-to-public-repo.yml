name: Mirror to Public Repo

on:
  push:
    branches:
      - main        # Add any branches you want to mirror
      - release/**  # Example: mirror all release branches

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important: fetch full history, not just latest commit

      - name: Push to public mirror
        env:
          PUBLIC_REPO: https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/katyaov/Coral-Model-Public.git
        run: |
          git remote add public $PUBLIC_REPO
          git push public ${{ github.ref_name }}:${{ github.ref_name }} --force
